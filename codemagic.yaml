# ──────────────────────────────────────────────────
#  Shared definitions (YAML anchors)
# ──────────────────────────────────────────────────
definitions:
  environment:
    vars: &shared_vars
      BUNDLE_ID: "com.y2notes.app"
      APP_ORG: "com.y2notes"

  scripts:
    # ── Setup ──
    - &flutter_pub_get
      name: Get Flutter packages
      script: flutter pub get

    - &bootstrap_ios
      name: Bootstrap iOS platform
      script: |
        if [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
          flutter create --platforms=ios --org "$APP_ORG" --project-name app .
        fi

    - &configure_ipad_plist
      name: Configure Info.plist for iPad support
      script: |
        # Re-applies iPad settings in case the Bootstrap step ran
        # flutter create and regenerated Info.plist with defaults.
        INFO_PLIST="ios/Runner/Info.plist"

        # Support both iPhone (1) and iPad (2)
        /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" "$INFO_PLIST" 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array"       "$INFO_PLIST"
        /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" "$INFO_PLIST"
        /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:1 integer 2" "$INFO_PLIST"

        # iPad-specific orientations
        /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$INFO_PLIST" 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$INFO_PLIST"
        for orient in UIInterfaceOrientationPortrait \
                      UIInterfaceOrientationPortraitUpsideDown \
                      UIInterfaceOrientationLandscapeLeft \
                      UIInterfaceOrientationLandscapeRight; do
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad: string $orient" "$INFO_PLIST"
        done

        # Require full screen on iPad (needed for App Store submission)
        /usr/libexec/PlistBuddy -c "Delete :UIRequiresFullScreen" "$INFO_PLIST" 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$INFO_PLIST"

    # ── Testing ──
    - &run_flutter_tests
      name: Run Flutter unit tests
      script: flutter test || true

    - &run_ipad_simulator_tests
      name: Run tests on iPad Simulator
      script: |
        xcodebuild test \
          -workspace ios/Runner.xcworkspace \
          -scheme Runner \
          -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' \
          -sdk iphonesimulator \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | xcpretty || true

  # ── Caching ──
  cache_paths: &cache_paths
    - $FLUTTER_ROOT/.pub-cache
    - $HOME/.gradle/caches
    - $HOME/Library/Caches/CocoaPods

# ──────────────────────────────────────────────────
#  Workflows
# ──────────────────────────────────────────────────
workflows:

  # ════════════════════════════════════════════════
  #  1. Pull-request check  (no signing, no deploy)
  # ════════════════════════════════════════════════
  ios-pr-check:
    name: iOS PR Check
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      vars:
        <<: *shared_vars
    cache:
      cache_paths: *cache_paths
    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
    scripts:
      - *flutter_pub_get
      - *bootstrap_ios
      - *configure_ipad_plist
      - *run_flutter_tests
      - *run_ipad_simulator_tests
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  # ════════════════════════════════════════════════
  #  2. TestFlight release  (signed + distributed)
  # ════════════════════════════════════════════════
  ios-testflight:
    name: iOS iPad TestFlight Distribution
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic2
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.y2notes.app
      vars:
        <<: *shared_vars
    cache:
      cache_paths: *cache_paths
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      # ── Setup ──
      - *flutter_pub_get
      - *bootstrap_ios
      - *configure_ipad_plist

      # ── Signing ──
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      # ── Version ──
      - name: Increment build number
        script: |
          flutter build ios --config-only
          cd ios && agvtool new-version -all $BUILD_NUMBER

      # ── Test ──
      - *run_flutter_tests
      - *run_ipad_simulator_tests

      # ── Build ──
      - name: Build IPA for App Store distribution
        script: |
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - user1@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
