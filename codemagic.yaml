workflows:
  ios-ipad-workflow:
    name: iOS iPad TestFlight Distribution
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic2
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.y2notes.y2notes2
      vars:
        BUNDLE_ID: "com.y2notes.y2notes2"
        APP_ORG: "com.y2notes"
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Bootstrap iOS platform
        script: |
          if [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            flutter create --platforms=ios --org "$APP_ORG" --project-name y2notes2 .
          fi
      - name: Configure Info.plist for iPad support
        # This step re-applies iPad settings in case the Bootstrap step ran
        # flutter create and regenerated Info.plist with defaults.
        script: |
          INFO_PLIST="ios/Runner/Info.plist"
          # Support both iPhone (1) and iPad (2)
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:1 integer 2" "$INFO_PLIST"
          # iPad-specific orientations
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:1 string UIInterfaceOrientationPortraitUpsideDown" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:2 string UIInterfaceOrientationLandscapeLeft" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:3 string UIInterfaceOrientationLandscapeRight" "$INFO_PLIST"
          # Require full screen on iPad (needed for App Store submission)
          /usr/libexec/PlistBuddy -c "Delete :UIRequiresFullScreen" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$INFO_PLIST"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          flutter build ios --config-only
          cd ios && agvtool new-version -all $BUILD_NUMBER
      - name: Run tests on iPad Simulator
        script: |
          flutter test || true
          xcodebuild test \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' \
            -sdk iphonesimulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true
      - name: Build IPA for App Store distribution
        script: |
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - user1@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
