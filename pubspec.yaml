name: biscuits
description: A modern cross-platform note-taking app with magical writing effects
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  go_router: ^12.0.0
  perfect_freehand: ^2.0.0
  uuid: ^4.2.1
  equatable: ^2.0.5
  vector_math: ^2.1.4
  shared_preferences: ^2.2.2
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.1
  file_picker: ^11.0.2
  image: ^4.1.3
  record: ^5.1.2
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
