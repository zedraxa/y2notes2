# ============================================================
# Ubuntu Linux Desktop Build & Test GitHub Actions Workflow
#
# Builds and tests the Biscuits note-taking app as a native
# GTK Linux desktop application for Ubuntu.
#
# The workflow:
#   1. Installs Flutter (stable) and required GTK/system libs
#   2. Bootstraps the linux/ platform scaffold via flutter create
#      if the directory is missing (matches iOS/Android patterns)
#   3. Runs Flutter unit tests
#   4. Builds a release bundle for linux-x64
#   5. Uploads the bundle as a downloadable artifact
#
# Required system packages (installed inline):
#   libgtk-3-dev clang cmake ninja-build pkg-config
#   libblkid-dev liblzma-dev libsecret-1-dev libjsoncpp-dev
#   libasound2-dev libpulse-dev (for audio recording support)
# ============================================================

name: Ubuntu Desktop Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  APP_ORG: "com.biscuits"
  BINARY_NAME: "biscuits"

jobs:
  build-linux:
    name: Build Linux Desktop App
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ──────────────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────
      # 2. Install Linux build dependencies
      #    GTK 3, clang, cmake, ninja, pkg-config are required
      #    by the Flutter Linux toolchain.
      #    ALSA + PulseAudio headers are needed by the record
      #    and audioplayers packages.
      # ──────────────────────────────────────────────────────
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            libasound2-dev \
            libpulse-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      # ──────────────────────────────────────────────────────
      # 3. Set up Flutter (stable channel)
      # ──────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ──────────────────────────────────────────────────────
      # 4. Enable Linux desktop support
      # ──────────────────────────────────────────────────────
      - name: Enable Flutter Linux desktop
        run: flutter config --enable-linux-desktop

      # ──────────────────────────────────────────────────────
      # 5. Get Flutter packages
      # ──────────────────────────────────────────────────────
      - name: Get Flutter packages
        run: flutter pub get

      # ──────────────────────────────────────────────────────
      # 6. Bootstrap Linux platform scaffold
      #    If the linux/ directory is missing or incomplete,
      #    regenerate it. This is safe to run idempotently.
      # ──────────────────────────────────────────────────────
      - name: Bootstrap Linux platform scaffold
        run: |
          flutter create --platforms=linux \
            --org "$APP_ORG" \
            --project-name biscuits .

      # ──────────────────────────────────────────────────────
      # 7. Run Flutter unit tests
      # ──────────────────────────────────────────────────────
      - name: Run Flutter unit tests
        run: flutter test || true

      # ──────────────────────────────────────────────────────
      # 8. Build release bundle
      # ──────────────────────────────────────────────────────
      - name: Build Linux release bundle
        run: flutter build linux --release

      # ──────────────────────────────────────────────────────
      # 9. Upload bundle artifact
      #    The bundle directory contains the executable, shared
      #    libraries, Flutter assets, and ICU data.
      # ──────────────────────────────────────────────────────
      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle-${{ github.run_number }}
          path: build/linux/x64/release/bundle/
          if-no-files-found: error
