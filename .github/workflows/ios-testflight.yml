# ============================================================
# iOS iPad → TestFlight GitHub Actions Workflow
# Mirrors the existing codemagic.yaml pipeline.
#
# Required GitHub repository secrets (Settings → Secrets →
# Actions → New repository secret):
#
#   APP_STORE_CONNECT_API_KEY_ID        – App Store Connect API Key ID
#   APP_STORE_CONNECT_ISSUER_ID         – App Store Connect Issuer ID
#   APP_STORE_CONNECT_API_PRIVATE_KEY   – Contents of the .p8 private key file
#   IOS_DISTRIBUTION_CERTIFICATE_P12    – Base64-encoded .p12 distribution certificate
#                                         (openssl base64 -in Cert.p12 | pbcopy)
#   IOS_DISTRIBUTION_CERTIFICATE_PASSWORD – Password for the .p12 certificate
#   IOS_PROVISIONING_PROFILE            – Base64-encoded .mobileprovision file
#                                         (base64 -i profile.mobileprovision | pbcopy)
#   KEYCHAIN_PASSWORD                   – Any strong password for the temporary keychain
# ============================================================

name: iOS iPad TestFlight Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BUNDLE_ID: "com.y2notes.app"
  APP_ORG: "com.y2notes"
  # Temporary keychain name (unique per run to avoid conflicts)
  KEYCHAIN_NAME: "build-${{ github.run_number }}.keychain"
  # Path where the provisioning profile will be installed
  PP_PATH: "${{ github.workspace }}/profile.mobileprovision"

jobs:
  build-and-deploy:
    name: Build iOS IPA & Upload to TestFlight
    runs-on: macos-14   # Apple Silicon — equivalent to Codemagic's mac_mini_m2
    permissions:
      contents: read    # Minimal token permissions — no write access needed

    steps:
      # ----------------------------------------------------------
      # 1. Checkout source code
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 2. Set up Flutter (stable channel)
      # ----------------------------------------------------------
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ----------------------------------------------------------
      # 3. Get Flutter packages
      # ----------------------------------------------------------
      - name: Get Flutter packages
        run: flutter pub get

      # ----------------------------------------------------------
      # 4. Bootstrap iOS platform
      # If Runner.xcodeproj is missing (e.g. a fresh clone that is
      # missing the Xcode project), regenerate it via flutter create.
      # ----------------------------------------------------------
      - name: Bootstrap iOS platform
        run: |
          if [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            flutter create --platforms=ios \
              --org "$APP_ORG" \
              --project-name y2notes2 .
          fi

      # ----------------------------------------------------------
      # 5. Configure Info.plist for iPad support
      # This step is run AFTER the optional bootstrap above so that
      # even if flutter create re-generated Info.plist the iPad
      # settings are always applied.
      # ----------------------------------------------------------
      - name: Configure Info.plist for iPad support
        run: |
          INFO_PLIST="ios/Runner/Info.plist"

          # Support both iPhone (1) and iPad (2)
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:1 integer 2" "$INFO_PLIST"

          # iPad-specific orientations (all four)
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:1 string UIInterfaceOrientationPortraitUpsideDown" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:2 string UIInterfaceOrientationLandscapeLeft" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:3 string UIInterfaceOrientationLandscapeRight" "$INFO_PLIST"

          # Require full screen on iPad (required for App Store submission)
          /usr/libexec/PlistBuddy -c "Delete :UIRequiresFullScreen" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$INFO_PLIST"

      # ----------------------------------------------------------
      # 6. Install Apple certificate & provisioning profile
      # Creates a short-lived keychain, imports the distribution
      # certificate, and places the provisioning profile where
      # Xcode expects to find it.
      # ----------------------------------------------------------
      - name: Install Apple certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PP_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode the certificate and provisioning profile from Base64
          echo "$P12_BASE64" | base64 --decode > /tmp/certificate.p12
          echo "$PP_BASE64"  | base64 --decode > "$PP_PATH"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_NAME"

          # Import the certificate into the keychain
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the key without a password prompt
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" \
            "$KEYCHAIN_NAME"

          # Add our keychain to the search list so Xcode finds it
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain

          # Install the provisioning profile into the standard Xcode location
          PP_XML=$(security cms -D -i "$PP_PATH")
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$PP_XML")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" \
            "$HOME/Library/MobileDevice/Provisioning Profiles/${PP_UUID}.mobileprovision"

          # Extract signing details needed by the build and export steps
          PP_TEAM_ID=$(/usr/libexec/PlistBuddy -c \
            "Print :Entitlements:com.apple.developer.team-identifier" \
            /dev/stdin <<< "$PP_XML")
          PP_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" \
            /dev/stdin <<< "$PP_XML")
          SIGNING_IDENTITY=$(
            security find-identity -v -p codesigning "$KEYCHAIN_NAME" \
              | grep -E '"iPhone Distribution|"Apple Distribution' \
              | head -1 \
              | sed -E 's/.*"(.+)".*/\1/'
          )
          {
            echo "TEAM_ID=$PP_TEAM_ID"
            echo "PROFILE_NAME=$PP_PROFILE_NAME"
            echo "SIGNING_IDENTITY=$SIGNING_IDENTITY"
          } >> "$GITHUB_ENV"

      # ----------------------------------------------------------
      # 7. Generate ExportOptions.plist
      # Tells xcodebuild how to package and sign the IPA for App
      # Store / TestFlight distribution.
      # ----------------------------------------------------------
      - name: Generate ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
              "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>destination</key>
              <string>export</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.y2notes.app</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      # ----------------------------------------------------------
      # 8. Increment build number
      # Uses agvtool (same as Codemagic) so that each GitHub Actions
      # run gets a unique, monotonically increasing build number.
      # ----------------------------------------------------------
      - name: Increment build number
        run: |
          flutter build ios --config-only --no-codesign
          cd ios && agvtool new-version -all ${{ github.run_number }}

      # ----------------------------------------------------------
      # 9. Run Flutter unit tests (non-blocking)
      # Failures here will not abort the workflow (matches Codemagic
      # behaviour of `flutter test || true`).
      # ----------------------------------------------------------
      - name: Run Flutter tests
        run: flutter test || true

      # ----------------------------------------------------------
      # 10. Run xcodebuild tests on iPad simulator (non-blocking)
      # ----------------------------------------------------------
      - name: Run xcodebuild tests on iPad simulator
        run: |
          xcodebuild test \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' \
            -sdk iphonesimulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | xcpretty || true

      # ----------------------------------------------------------
      # 11. Build the release IPA
      # Uses xcodebuild directly to bypass Flutter's codesign
      # pre-flight check ("security find-identity"), which fails in
      # CI even after a successful certificate import.  Signing
      # parameters are passed explicitly as build-setting overrides
      # so Xcode never needs to auto-discover them.
      # ----------------------------------------------------------
      - name: Build IPA for App Store distribution
        run: |
          XCODE_LOGS_DIR=/tmp/xcodebuild_logs
          mkdir -p "$XCODE_LOGS_DIR"

          # Archive with explicit manual code signing
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            archive \
            2>&1 | tee "$XCODE_LOGS_DIR/archive.log"

          # Export IPA from the archive
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa \
            2>&1 | tee "$XCODE_LOGS_DIR/export.log"

      # ----------------------------------------------------------
      # 12. Upload build artifacts to GitHub Actions
      # .ipa, dSYM files, and Xcode build logs are stored as run
      # artifacts so they can be downloaded later if needed.
      # ----------------------------------------------------------
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload dSYM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dsym-${{ github.run_number }}
          path: "$HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM"
          if-no-files-found: ignore

      - name: Upload Xcode build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xcode-logs-${{ github.run_number }}
          path: /tmp/xcodebuild_logs/*.log
          if-no-files-found: ignore

      # ----------------------------------------------------------
      # 13. Upload to TestFlight via App Store Connect API
      # Uses xcrun altool with JWT-based App Store Connect API key
      # authentication. Note: altool is available on Xcode 15
      # (macos-14). If you migrate to macos-15 (Xcode 16+) you will
      # need to replace this step with a direct App Store Connect
      # REST API call or a third-party action such as
      # apple-actions/upload-testflight-build.
      # ----------------------------------------------------------
      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          # Write the private key to a temp file that altool can read.
          # altool looks for keys in ~/.appstoreconnect/private_keys/.
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_PRIVATE_KEY" \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          # Find the built IPA
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"

          # Upload to TestFlight using App Store Connect API auth.
          # xcrun altool is deprecated in Xcode 14+ but is still
          # present and functional in Xcode 15 (macos-14 default).
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey  "$API_KEY_ID" \
            --apiIssuer "$ISSUER_ID"

          # Remove the private key from disk immediately after use
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      # ----------------------------------------------------------
      # 14. Clean up temporary keychain (always runs)
      # Deletes the keychain that was created in step 6 to avoid
      # leaving signing credentials on the runner.
      # ----------------------------------------------------------
      - name: Clean up temporary keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
          rm -f /tmp/certificate.p12
